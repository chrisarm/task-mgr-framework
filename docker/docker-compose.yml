name: task-mgr-recall

services:
  # --- GPU variants (default — no --profile flag required) ---

  ollama:
    build:
      context: ./ollama
    ports:
      - "11435:11434"
    restart: unless-stopped
    healthcheck:
      # /api/tags lists installed models — cheap, 200 even on empty install.
      # ollama/ollama base image (Ubuntu) ships curl.
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  llama-box:
    build:
      context: ./llama-box
      args:
        LLAMA_BOX_VARIANT: cuda-12.8
    ports:
      # Host 8181 (project default — avoids clashing with other projects
      # that commonly publish on 8080); container internal stays at 8080.
      - "8181:8080"
    restart: unless-stopped
    healthcheck:
      # Try /health, fall back to /v1/models (OpenAI-compat, 200 when model loaded),
      # then TCP probe via nc. llama-box base image ships wget (used in Dockerfile RUN);
      # curl may not be present — prefer wget for HTTP probes.
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/health 2>/dev/null || wget -qO /dev/null http://localhost:8080/v1/models 2>/dev/null || nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --- CPU-only variants (opt-in via --profile cpu) ---

  ollama-cpu:
    profiles: [cpu]
    build:
      context: ./ollama
    ports:
      - "11435:11434"
    restart: unless-stopped
    healthcheck:
      # Same probe as GPU variant; start_period 60s covers model load on CPU.
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  llama-box-cpu:
    profiles: [cpu]
    build:
      context: ./llama-box
    ports:
      # Host 8181 (see GPU variant above for rationale).
      - "8181:8080"
    restart: unless-stopped
    healthcheck:
      # Same probe as GPU variant; wget preferred (confirmed available in base image).
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/health 2>/dev/null || wget -qO /dev/null http://localhost:8080/v1/models 2>/dev/null || nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
